<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Литературный Гид: 5 класс</title>
    <style>
        :root {
            --bg-color: #08090f;
            --panel-bg: #141628;
            --card-inner: #1b1d36;
            --accent-cyan: #00ffdc;
            --accent-purple: #9d4edd;
            --accent-pink: #ff2e63;
            --text-main: #f0f5ff;
            --text-muted: #7d85a6;
            --glow-cyan: 0 0 15px rgba(0, 255, 220, 0.25);
            --glow-purple: 0 0 15px rgba(157, 78, 221, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            width: 100%;
            max-width: 1200px;
        }

        header h1 {
            font-size: 2.3rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(0, 255, 220, 0.4);
            color: #fff;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .main-layout {
            display: flex;
            width: 100%;
            max-width: 1250px;
            gap: 25px;
        }

        /* Боковое меню со списком книг */
        .sidebar {
            flex: 1.1;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 82vh;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        .section-title {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 800;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-title.required { border-bottom: 1px solid rgba(0, 255, 220, 0.2); }
        .section-title.extra { border-bottom: 1px solid rgba(157, 78, 221, 0.2); }
        .section-title:first-child { margin-top: 0; }

        .book-btn {
            display: block;
            width: 100%;
            padding: 11px 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            color: var(--text-main);
            text-align: left;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
            transition: all 0.25s ease;
        }

        /* Подсветка кнопок в зависимости от категории */
        .required-list .book-btn:hover, .required-list .book-btn.active {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 255, 220, 0.04);
            box-shadow: var(--glow-cyan);
        }

        .extra-list .book-btn:hover, .extra-list .book-btn.active {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(157, 78, 221, 0.04);
            box-shadow: var(--glow-purple);
        }

        /* Правая зона для вывода содержания */
        .workspace {
            flex: 1.5;
            background: var(--panel-bg);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: fit-content;
            position: sticky;
            top: 25px;
        }

        .content-card {
            background: var(--card-inner);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-cyan);
            transition: border-color 0.3s;
        }

        .content-card.extra-border {
            border-left-color: var(--accent-purple);
        }

        .book-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }

        .book-author {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .summary-box {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-main);
            opacity: 0;
            transform: translateY(8px);
        }

        .fade-in {
            animation: textReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes textReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .badge.req { background: rgba(0, 255, 220, 0.1); color: var(--accent-cyan); }
        .badge.ext { background: rgba(157, 78, 221, 0.15); color: var(--accent-purple); }
    </style>
</head>
<body>

    <header>
        <h1>READING LIST PRO</h1>
        <p>Краткое содержание произведений по программе В. Я. Коровиной (5 класс)</p>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <div class="section-title required">📋 Обязательное чтение</div>
            <div class="required-list" id="req-box"></div>

            <div class="section-title extra">📚 Дополнительное чтение</div>
            <div class="extra-list" id="ext-box"></div>
        </div>

        <div class="workspace" id="display-workspace">
            </div>
    </div>

    <script>
        // Датабаза кратких содержаний по твоему списку
        const literatureDB = {
            // --- Обязательное чтение ---
            heracles: {
                author: "Мифы Древней Греции", title: "Подвиги Геракла («Скотный двор царя Авгия», «Яблоки Гесперид»)", isExtra: false,
                text: "Цикл легенд о сыне Зевса — Геракле. В мифе об Авгиевых конюшнях герой проявляет инженерную смекалку, направив русла двух рек в скотный двор, чтобы очистить его за один день. В поисках золотых яблок Гесперид Гераклу приходится держать на своих плечах небосвод вместо титана Атланта и проявить хитрость, чтобы вернуть ношу обратно титану."
            },
            fairy_tales: {
                author: "Русские народные сказки", title: "«Царевна-лягушка», «Журавль и цапля», «Солдатская шинель»", isExtra: false,
                text: "«Царевна-лягушка» рассказывает об Иване-царевиче, чей выбор пал на лягушку, оказавшуюся Василисой Премудрой. Сказка учит терпению и верности. «Журавль и цапля» — поучительная сатирическая сказка о гордости и нерешительности, где герои бесконечно ходят свататься друг к другу. «Солдатская шинель» высмеивает барскую лень и глупость — барин покупает у солдата шинель, но не может на ней спать, так как «солдатская смекалка и приправленный трудом сон» не продаются вместе с вещью."
            },
            krylov: {
                author: "И. А. Крылов", title: "Басни («Волк на псарне», «Листы и Корни», «Свинья под Дубом» и др.)", isExtra: false,
                text: "Классические басни, высмеивающие человеческие пороки. «Волк на псарне» — аллегория на Отечественную войну 1812 года, где Волк (Наполеон) сталкивается с мудрым Ловчим (Кутузов). «Листы и Корни» раскрывают важность простого рабочего класса (корней), без которого элита (листы) погибнет. «Свинья под Дубом» порицает невежество людей, уничтожающих то, от чего сами же питаются."
            },
            pushkin: {
                author: "A. C. Пушкин", title: "«Сказка о мёртвой царевне и о семи богатырях»", isExtra: false,
                text: "Поэтическая сказка о завистливой мачехе-царице, которая пытается погубить прекрасную падчерицу из-за её красоты. Царевна находит приют в лесной дубраве у семи братьев-богатырей, но мачеха отравляет её яблоком. Королевич Елисей отправляется на поиски невесты, обращается к Солнцу, Месяцу и Ветру, и силой своей любви пробуждает царевну ото сна в хрустальном гробу."
            },
            gogol: {
                author: "Н. В. Гоголь", title: "«Ночь перед Рождеством», «Заколдованное место»", isExtra: false,
                text: "«Ночь перед Рождеством» — колоритная повесть о кузнеце Вакуле, который ради любви к капризной красавице Оксане оседлал чёрта и слетал в Петербург за царскими черевичками. «Заколдованное место» — мистический рассказ о деде, который никак не мог выкопать клад на проклятом клочке земли бахчи, так как нечистая сила постоянно морочила ему голову, подсовывая вместо золота сор и грязь."
            },
            turgenev: {
                author: "И. С. Тургенев", title: "Рассказ «Муму»", isExtra: false,
                text: "Трагическая история о глухонемом дворнике Герасиме, крепостном у жестокой и капризной московской барыни. Единственным утешением для одинокого богатыря становится спасенная им собачка Муму. Из-за взбалмошного приказа барыни Герасим вынужден утопить своего преданного питомца, после чего в знак протеста против крепостного гнёта самовольно уходит обратно в родную деревню."
            },
            tolstoy: {
                author: "Л. Н. Толстой", title: "Рассказ «Кавказский пленник»", isExtra: false,
                text: "Повесть о двух русских офицерах, Жилине и Костылине, попавших в плен к татарам. Жилин — деятельный, сильный духом человек: он изучает аул, мастерит игрушки для местной девочки Дины и готовит побег. Костылин — слабый и пассивный, лишь ждет выкупа. С помощью отважной Дины Жилин совершает успешный побег, доказывая, что мужество и воля побеждают любые обстоятельства."
            },
            chekhov: {
                author: "А. П. Чехов", title: "«Лошадиная фамилия», «Мальчики», «Хирургия»", isExtra: false,
                text: "Юмористические рассказы. «Лошадиная фамилия» — о генерале, у которого разболелся зуб, и вся семья мучительно пыталась вспомнить «лошадиную» фамилию знахаря, оказавшуюся Овсовым. «Мальчики» — история о двух гимназистах, начитавшихся Майн Рида и решивших сбежать в Америку охотиться на бизонов. «Хирургия» — яркая сатира на некомпетентность фельдшера Курятина, который вместо лечения жестоко и безуспешно рвёт зуб дьячку."
            },
            zoschenko: {
                author: "М. М. Зощенко", title: "«Галоша», «Лёля и Минька», «Ёлка», «Золотые слова»", isExtra: false,
                text: "Цикл автобиографических поучительных рассказов о детстве. Автор с мягким юмором вспоминает свои капризы и ошибки, делясь важными уроками о том, почему нельзя жадничать, портить чужие праздники, лгать взрослым и почему так важно всегда думать о чувствах окружающих людей."
            },
            prishvin: {
                author: "М. М. Пришвин", title: "Сказка-быль «Кладовая солнца»", isExtra: false,
                text: "История о сиротах Насте и Митраше, отправившихся за клюквой на Блудово болото. Поспорив о выборе тропы, дети разделяются. Митраша попадает в опасную трясину Слепой елани, но его спасает верная охотничья собака Травка. Произведение воспевает богатство природы («кладовую солнца») и напоминает о важности единства и любви между людьми."
            },
            paustovsky: {
                author: "К. Г. Паустовский", title: "«Тёплый хлеб», «Заячьи лапы», «Кот-ворюга»", isExtra: false,
                text: "Добрые рассказы о природе. В «Тёплом хлебе» мальчик Филька обижает раненого коня, из-за чего на деревню обрушивается страшный мороз. Осознав вину, Филька вместе с ребятами растапливает лед и мирится с конем. «Заячьи лапы» рассказывают о спасении дедом дегтярем зайца, который вывел его из лесного пожара, а «Кот-ворюга» — о бездомном коте, который воровал еду, но превратился в верного охранника после того, как его впервые накормили."
            },
            astafev: {
                author: "В. П. Астафьев", title: "Рассказ «Васюткино озеро»", isExtra: false,
                text: "Тринадцатилетний Васютка отправляется в тайгу за кедровыми орехами для рыбаков и, погнавшись за глухарем, теряет дорогу. Пять дней мальчик в одиночку выживает в суровой глухой тайге, применяя все знания об охоте и приметах. В итоге он выходит к Енисею и открывает новое богатое рыбой озеро, которое взрослые впоследствии называют его именем."
            },
            kataev: {
                author: "В. П. Катаев", title: "Повесть «Сын полка»", isExtra: false,
                text: "Патриотическая повесть о Великой Отечественной войне. Разведчики находят в окопе дикого, истощенного двенадцатилетнего сироту Ваню Солнцева. Офицеры и солдаты привязываются к мальчику и делают его «сыном полка». Пройдя через боевые испытания и потеряв своего наставника капитана Енакиева, Ваня направляется в Суворовское училище, чтобы стать кадровым военным."
            },

            // --- Дополнительное чтение ---
            kuprin: {
                author: "А. И. Куприн", title: "Повесть «Белый пудель»", isExtra: true,
                text: "Трогательная история о бродячей труппе артистов: старом шарманщике Лодыжкине, мальчике-акробате Серёже и умном пуделе Арто. Богатая избалованная семья пытается выкупить собаку для своего капризного сына, а получив отказ, крадет её. Юный Серёжа, рискуя собой, пробирается ночью на дачу и спасает своего четвероногого друга."
            },
            platonov: {
                author: "А. П. Платонов", title: "Рассказы «Корова», «Никита»", isExtra: true,
                text: "«Корова» рассказывает о мальчике Васе, который тяжело переживает тоску и гибель старой домашней коровы, чей теленок был продан. «Никита» — глубокий рассказ о маленьком мальчике с богатым воображением. Оставаясь дома один, он одушевляет все предметы вокруг, видя в пнях и колодцах тайных существ. Возвращение отца с фронта избавляет мальчика от детских страхов."
            },
            bulychev: {
                author: "К. Булычёв", title: "«Девочка, с которой ничего не случится»", isExtra: true,
                text: "Фантастические юмористические рассказы о приключениях Алисы Селезнёвой — девочки из будущего (XXI века). Вместе со своим папой, профессором космозоологии, Алиса путешествует по далеким планетам, собирает редких космических зверей, находит затерянные цивилизации и постоянно попадает в невероятные истории, из которых всегда выходит невредимой."
            },
            twain: {
                author: "Марк Твен", title: "«Приключения Тома Сойера»", isExtra: true,
                text: "Приключенческий роман о весёлом, предприимчивом и озорном мальчике Томе Сойере из городка на Миссисипи. Том умудряется превратить наказание в виде покраски забора в прибыльный бизнес, ищет клады на кладбище с Гекльберри Финном, становится свидетелем преступления, сбегает на необитаемый остров в «пираты» и находит настоящие сокровища."
            },
            kipling: {
                author: "Дж. Р. Киплинг", title: "«Маугли», «Рикки-Тикки-Тави»", isExtra: true,
                text: "«Маугли» — история человеческого ребенка, воспитанного волчьей стаей в джунглях Индии, изучающего Законы Джунглей под присмотром медведя Балу и пантеры Багиры. «Рикки-Тикки-Тави» — героический рассказ о молодом отважном мангусте, которого принимает человеческая семья. Рикки вступает в смертельное противостояние с опасными королевскими кобрами Нагом и Нагайной, защищая своих людей."
            },
            bradbury: {
                author: "Рэй Брэдбери", title: "«Каникулы», «Звук бегущих ног», «Зелёное утро»", isExtra: true,
                text: "Фантастические и философские рассказы. «Каникулы» — история о семье, пожелавшей, чтобы весь мир исчез и они остались одни, и осознавшей ужас тотального одиночества. «Звук бегущих ног» воспевает детскую радость от пары новых теннисных туфель, возвращающих силу бега, а «Зелёное утро» — о человеке, который вручную засаживает пустынный Марс семенами земных деревьев, чтобы дать планете кислород."
            },
            rowling: {
                author: "Дж. Роулинг", title: "«Гарри Поттер и философский камень»", isExtra: true,
                text: "Первая книга всемирно известной фэнтези-саги. Сирота Гарри Поттер узнает на свое одиннадцатилетие, что он — волшебник, и зачислен в школу чародейства и волшебства «Хогвартс». Там он находит верных друзей Рона и Гермиону, сталкивается со строгими преподавателями, учится летать на метле и впервые дает отпор темному магу Волан-де-Морту."
            },
            tolkien: {
                author: "Дж. Толкин", title: "«Хоббит, или Туда и обратно»", isExtra: true,
                text: "Увлекательное фэнтези о хоббите Бильбо Бэггинсе, который против своей воли отправляется в масштабный поход вместе с волшебником Гэндальфом и отрядом гномов. Их цель — вернуть сокровища гномов, захваченные грозным драконом Смаугом в Одинокой горе. В пути Бильбо проявляет храбрость, находит загадочное кольцо и превращается из домоседа в настоящего героя."
            },
            verne: {
                author: "Жюль Верн", title: "«Таинственный остров»", isExtra: true,
                text: "Классический научно-приключенческий роман. Пятеро смелых американцев во главе с инженером Сайресом Смитом сбегают из плена на воздушном шаре и терпят крушение на необитаемом острове в Тихом океане. Благодаря знаниям, науке и упорному труду колонисты выстраивают процветающее хозяйство, преодолевают пиратские набеги и узнают, что ими тайно руководил загадочный капитан Немо."
            }
        };

        // Заполнение меню кнопками
        function initSidebar() {
            const reqBox = document.getElementById("req-box");
            const extBox = document.getElementById("ext-box");

            for (let key in literatureDB) {
                const book = literatureDB[key];
                const btn = document.createElement("button");
                btn.className = "book-btn";
                btn.innerText = `${book.author} — ${book.title.split('(')[0].trim()}`;
                btn.onclick = () => selectBook(key, btn);

                if (book.isExtra) {
                    extBox.appendChild(btn);
                } else {
                    reqBox.appendChild(btn);
                }
            }
        }

        // Вывод краткого содержания при клике
        function selectBook(key, clickedBtn) {
            // Снимаем класс активности со всех кнопок
            document.querySelectorAll(".book-btn").forEach(b => b.classList.remove("active"));
            clickedBtn.classList.add("active");

            const book = literatureDB[key];
            const workspace = document.getElementById("display-workspace");

            const badgeClass = book.isExtra ? "badge ext" : "badge req";
            const badgeText = book.isExtra ? "Дополнительная программа" : "Обязательное чтение";
            const cardBorderClass = book.isExtra ? "content-card extra-border" : "content-card";

            workspace.innerHTML = `
                <div class="${badgeClass}">${badgeText}</div>
                <div class="${cardBorderClass}">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                </div>
                <div class="summary-box" id="summary-text">${book.text}</div>
            `;

            // Запускаем анимацию плавного появления текста
            setTimeout(() => {
                document.getElementById("summary-text").classList.add("fade-in");
            }, 50);
        }

        // Стартовое состояние рабочего поля
        function initWorkspace() {
            const workspace = document.getElementById("display-workspace");
            workspace.innerHTML = `
                <div style="text-align: center; padding: 40px 0; color: var(--text-muted);">
                    <div style="font-size: 3rem; margin-bottom: 10px;">📖</div>
                    <h3>Выберите любое произведение из списка слева, чтобы открыть его краткое содержание.</h3>
                </div>
            `;
        }

        // Запуск сайта
        initSidebar();
        initWorkspace();
    </script>
</body>
</html>
